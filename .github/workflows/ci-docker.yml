# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven and Docker

on:
  push:
    branches-ignore:
    - main
  pull_request:
    branches:
    - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      # Use pre-built Docker image from https://github.com/advantest/fluentmark/blob/develop/.github/workflows/build-docker-img-for-plantuml.yml
      # The image provides Graphviz, Pandoc, JDK, Maven in the required versions
      image: ghcr.io/advantest/fluentmark:graphviz-11.0.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Check out
      uses: actions/checkout@v6

    # work-around since using the token with the setup-java action seems not to work
    - name: Set up settings.xml for Maven and GitHub packages access
      run: |
        mkdir -p $HOME/.m2
        cat > $HOME/.m2/settings.xml <<EOF
        <settings>
          <servers>
            <server>
              <id>github-packages-flexmark</id>
              <username>__token__</username>
              <password>${{ secrets.GITHUB_TOKEN }}</password>
            </server>
            <server>
              <id>github</id>
              <username>__token__</username>
              <password>${{ secrets.GITHUB_TOKEN }}</password>
            </server>
          </servers>
        </settings>

    - name: Build with Maven
      run: mvn -B clean verify --file pom.xml -U -s $HOME/.m2/settings.xml

    - name: Deploy to GitHub Maven Packages
      if: github.ref_name == 'develop'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: mvn -B clean -Pdeploy-github -DskipTests deploy -s $HOME/.m2/settings.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

